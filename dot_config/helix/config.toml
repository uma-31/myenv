theme = "tokyonight_storm"

[editor]
mouse = false

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false

[editor.soft-wrap]
enable = true

[editor.whitespace.render]
space = "all"
tab = "all"

[keys.normal]
C-b = ":sh git blame -L %{cursor_line},%{cursor_line} %{buffer_name}"

[keys.normal.space]
m = ":pipe-to ~/.config/helix/actions/preview-mermaid.sh"
